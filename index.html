
<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>狀態詞條計算機 v3</title>
  <style>
    :root{
      --bg:#f6f7fb; --card:#fff; --text:#1f2937; --sub:#6b7280; --line:#e5e7eb;
      --accent:#111827; --soft:#f3f4f6; --blue:#2563eb; --green:#16a34a;
    }
    *{box-sizing:border-box}
    body{margin:0;font-family:"Noto Sans TC","Microsoft JhengHei",system-ui,sans-serif;background:var(--bg);color:var(--text)}
    .wrap{max-width:1280px;margin:0 auto;padding:24px}
    .hero,.card{background:var(--card);border:1px solid var(--line);border-radius:24px;box-shadow:0 4px 16px rgba(15,23,42,.04)}
    .hero{padding:24px;display:flex;justify-content:space-between;align-items:flex-start;gap:16px;margin-bottom:24px;flex-wrap:wrap}
    h1,h2,h3,p{margin:0}
    .hero p{color:var(--sub);margin-top:8px;line-height:1.7}
    .btns,.action-row,.sub-row{display:flex;gap:10px;flex-wrap:wrap}
    button{border:none;border-radius:14px;padding:10px 14px;cursor:pointer;font-size:14px;font-weight:700}
    .btn-primary{background:var(--accent);color:#fff}
    .btn-secondary{background:var(--soft);color:var(--text)}
    .btn-outline{background:#fff;color:var(--text);border:1px solid var(--line)}
    .btn-blue{background:var(--blue);color:#fff}
    .btn-green{background:var(--green);color:#fff}
    .grid{display:grid;grid-template-columns:1.25fr .75fr;gap:24px}
    .card{padding:20px}
    .section-title{font-size:20px;font-weight:800;margin-bottom:16px}
    .entry,.result-card,.log-card{border:1px solid var(--line);border-radius:18px;padding:16px;background:#fff}
    .entry{margin-bottom:14px}
    .row{display:grid;grid-template-columns:1.2fr .6fr auto;gap:14px;align-items:start}
    label{display:block;font-size:13px;font-weight:700;margin-bottom:6px;color:var(--sub)}
    input,select{width:100%;border:1px solid var(--line);border-radius:12px;padding:10px 12px;font-size:14px;background:#fff}
    .note{margin-top:8px;color:var(--sub);line-height:1.7;font-size:14px}
    .badge{display:inline-block;background:var(--soft);border-radius:999px;padding:6px 10px;font-size:12px;font-weight:700;margin-bottom:8px}
    .stat-grid,.fields{display:grid;gap:12px}
    .stat{background:var(--soft);border-radius:18px;padding:16px}
    .stat-label{font-size:13px;color:var(--sub);margin-bottom:6px}
    .stat-value{font-size:30px;font-weight:900}
    .two{display:grid;grid-template-columns:1fr 1fr;gap:12px}
    .three{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
    .toggle{display:flex;justify-content:space-between;align-items:center;border:1px solid var(--line);border-radius:16px;padding:12px 14px;background:#fff;font-size:14px}
    .results{margin-top:24px}
    .result-card{margin-bottom:14px}
    .result-head{display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin-bottom:8px}
    .result-desc,.log-desc{line-height:1.7;font-size:14px}
    .mini-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-top:12px}
    .mini{background:var(--soft);padding:12px;border-radius:14px}
    .mini .k{font-size:12px;color:var(--sub);margin-bottom:4px}
    .mini .v{font-size:22px;font-weight:900}
    .help,.small{color:var(--sub);font-size:13px;line-height:1.7}
    .special-box{margin-top:12px;padding:12px;border-radius:14px;background:#fafafa;border:1px dashed var(--line)}
    .log-list{display:grid;gap:10px}
    .muted{color:var(--sub)}
    @media (max-width: 980px){.grid{grid-template-columns:1fr}.row{grid-template-columns:1fr}.two,.three{grid-template-columns:1fr}.mini-grid{grid-template-columns:1fr 1fr}}
    @media (max-width: 560px){.mini-grid{grid-template-columns:1fr}.wrap{padding:16px}.hero,.card{border-radius:18px}}
  </style>
</head>
<body>
<div class="wrap">
  <div class="hero">
    <div>
      <h1>狀態詞條計算機</h1>
      <p>v3：修正立刻結算邏輯，暫時型狀態會在幕末結束，並調整震顫攻擊 + 獵人的順序。</p>
    </div>
    <div class="btns">
      <button class="btn-primary" onclick="addEntry()">新增狀態</button>
      <button class="btn-secondary" onclick="applyEndScene()">套用幕結束</button>
      <button class="btn-outline" onclick="resetDemo()">重設範例</button>
    </div>
  </div>

  <div class="grid">
    <div class="card">
      <div class="section-title">狀態列表</div>
      <div id="entries"></div>
    </div>

    <div style="display:grid; gap:24px;">
      <div class="card">
        <div class="section-title">總結</div>
        <div class="stat-grid">
          <div class="stat"><div class="stat-label">本幕即時固定傷害</div><div class="stat-value" id="sumImmediate">0</div></div>
          <div class="stat"><div class="stat-label">幕結束固定傷害</div><div class="stat-value" id="sumEndDamage">0</div></div>
          <div class="stat"><div class="stat-label">幕結束混亂傷害</div><div class="stat-value" id="sumEndStagger">0</div></div>
        </div>
      </div>

      <div class="card">
        <div class="section-title">計算條件</div>
        <div class="fields">
          <div class="two">
            <div><label>本幕攻擊型骰子擲出次數</label><input type="number" id="attackRolls" value="2" oninput="updateCtxNum('attackRolls', this.value)"></div>
            <div><label>本幕被攻擊型骰命中次數</label><input type="number" id="hitByAttackDice" value="1" oninput="updateCtxNum('hitByAttackDice', this.value)"></div>
          </div>
          <div class="two">
            <div><label>本幕總擲骰次數</label><input type="number" id="diceRolled" value="2" oninput="updateCtxNum('diceRolled', this.value)"></div>
            <div><label>同一速度骰內使用的攻擊骰數</label><input type="number" id="attacksInSameSpeedDie" value="1" oninput="updateCtxNum('attacksInSameSpeedDie', this.value)"></div>
          </div>
          <div class="two">
            <div><label>基礎受到傷害</label><input type="number" id="baseDamage" value="10" oninput="updateCtxNum('baseDamage', this.value)"></div>
            <div><label>基礎受到混亂傷害</label><input type="number" id="baseStaggerDamage" value="8" oninput="updateCtxNum('baseStaggerDamage', this.value)"></div>
          </div>
          <div class="two">
            <div><label>攻擊骰基礎傷害</label><input type="number" id="baseAttackPower" value="5" oninput="updateCtxNum('baseAttackPower', this.value)"></div>
            <div><label>攻擊骰基礎達成值</label><input type="number" id="baseAttackValue" value="4" oninput="updateCtxNum('baseAttackValue', this.value)"></div>
          </div>
          <div class="two">
            <div><label>防禦骰基礎達成值</label><input type="number" id="baseDefenseValue" value="4" oninput="updateCtxNum('baseDefenseValue', this.value)"></div>
            <div><label>迴避骰基礎達成值</label><input type="number" id="baseEvadeValue" value="5" oninput="updateCtxNum('baseEvadeValue', this.value)"></div>
          </div>
          <div class="two">
            <div><label>基礎速度值</label><input type="number" id="baseSpeed" value="3" oninput="updateCtxNum('baseSpeed', this.value)"></div>
            <div><label>震顫-灼熱額外固定傷害</label><input type="number" id="extraFixedDamage" value="0" oninput="updateCtxNum('extraFixedDamage', this.value)"></div>
          </div>
          <div class="toggle"><span>本幕有與施加者拚點</span><button id="btnContested" class="btn-outline" onclick="toggleFlag('contested')">否</button></div>
          <div class="toggle"><span>自身已陷入混亂</span><button id="btnStaggered" class="btn-outline" onclick="toggleFlag('staggered')">否</button></div>
        </div>
        <div class="help">說明：立刻觸發會真正結算一次該效果；消耗層數時，會依該狀態原本的衰減規則更新層數，不再直接歸零。</div>
      </div>
    </div>
  </div>

  <div class="card results">
    <div class="section-title">逐條結果</div>
    <div id="results"></div>
  </div>

  <div class="card results">
    <div class="section-title">立刻觸發紀錄</div>
    <div id="logList" class="log-list"></div>
  </div>
</div>

<script>
const EFFECTS = [
  { key:"burn", name:"燒傷", group:"持續傷害", note:"每一幕結束時，受到 X 點傷害，數值減少至 2/3，向下取整。" },
  { key:"bleed", name:"出血", group:"持續傷害", note:"本幕中每次擲出攻擊型骰子後，受到 X 點傷害，數值減少至 2/3，向上取整。" },
  { key:"tremor", name:"震顫", group:"混亂傷害", note:"每一幕結束時，受到 X 點混亂傷害，數值減少至 2/3，向下取整。" },
  { key:"paralysis", name:"麻痺", group:"擲骰干擾", note:"本幕接下來要使用的骰子中，選出 X 個骰子重擲 1 次並取較低值。" },
  { key:"guard", name:"保護 / 易損", group:"傷害修正", note:"本幕中受到的傷害減少 ±X，最低不低於 0。正值視為保護，負值視為易損。" },
  { key:"staggerGuard", name:"振奮", group:"混亂傷害修正", note:"本幕中受到攻擊時的混亂傷害減少 ±X，最低不低於 0。" },
  { key:"strength", name:"強壯 / 虛弱", group:"攻擊修正", note:"本幕中攻擊骰的傷害、達成值 ±X；達成值最低 1。" },
  { key:"endurance", name:"忍耐 / 破綻", group:"防禦修正", note:"本幕中防禦骰、迴避骰的達成值與效力值 ±X；達成值最低 1。" },
  { key:"haste", name:"迅捷 / 束縛", group:"速度修正", note:"本幕中速度值 ±X；最低 1。" },
  { key:"charge", name:"充能", group:"特殊資源", note:"根據充能數值提升特定戰鬥特技能力。最大 10 層。" },
  { key:"smoke", name:"煙", group:"特殊增傷", note:"受到的傷害量增加 (X×5)%，最大 10 層；若 X≥9，攻擊/防禦/迴避值 +1；幕結束時 -1。" },
  { key:"fairy", name:"妖靈", group:"持續傷害", note:"每當擲出骰子時受到 X 點傷害；每一幕結束時再受到 X 點傷害，數值減少至 2/3，向下取整。" },
  { key:"scorchTremor", name:"震顫-灼熱", group:"複合效果", note:"被視作震顫；幕結束時受到 X 點混亂傷害與固定傷害，層數降低至 2/3，並且觸發燒傷。" },
  { key:"duel", name:"決鬥", group:"條件狀態", note:"幕結束時若持有者未與施加者拚點，解除該狀態；若自身陷入混亂，則不適用解除。" },
  { key:"fatigue", name:"力竭", group:"連續攻擊懲罰", note:"同一速度骰使用的攻擊骰每超出力竭 X 1 枚，命中 -2/-3/-4，傷害 -50%/-66%/-75%。" },
  { key:"rupture", name:"破裂", group:"持續傷害", note:"本幕中每次被攻擊型骰命中時，受到 X 點傷害，數值減少至 2/3，向上取整。" }
];

const TREMOR_ATTACKS = {
  0: { name:"不使用震顫攻擊", trigger:false, grants:[] },
  1: { name:"震顫攻擊 LV1", trigger:false, grants:[1] },
  2: { name:"震顫攻擊 LV2", trigger:true, grants:[2] },
  3: { name:"震顫攻擊 LV3", trigger:true, grants:[2,2] },
  4: { name:"震顫攻擊 LV4", trigger:true, grants:[5] },
  5: { name:"震顫攻擊 LV5", trigger:true, grants:[2,2,2] }
};

const DAMAGE_TYPES = ["burn","bleed","tremor","fairy","scorchTremor","rupture"];
const END_SCENE_EXPIRE = ["paralysis","guard","staggerGuard","strength","endurance","haste"];

let entries = [
  { id:1, type:"burn", stacks:10, tremorLevel:0, tremorBonus:0, hunter:false },
  { id:2, type:"tremor", stacks:10, tremorLevel:3, tremorBonus:1, hunter:true },
  { id:3, type:"guard", stacks:2, tremorLevel:0, tremorBonus:0, hunter:false }
];

let ctx = {
  attackRolls:2, hitByAttackDice:1, diceRolled:2, baseDamage:10, baseStaggerDamage:8,
  baseAttackPower:5, baseAttackValue:4, baseDefenseValue:4, baseEvadeValue:5,
  baseSpeed:3, extraFixedDamage:0, attacksInSameSpeedDie:1, contested:false, staggered:false
};

let logs = [];

function floorTwoThirds(x){ return Math.floor((x * 2) / 3); }
function ceilTwoThirds(x){ return Math.ceil((x * 2) / 3); }
function clampMin(v, min){ return Math.max(v, min); }
function clampMax(v, max){ return Math.min(v, max); }
function getMeta(key){ return EFFECTS.find(e => e.key === key); }
function isDamageType(type){ return DAMAGE_TYPES.includes(type); }

function resolveEntry(entry){
  const stacks = Number(entry.stacks) || 0;
  const attackRolls = Number(ctx.attackRolls) || 0;
  const hitByAttackDice = Number(ctx.hitByAttackDice) || 0;
  const diceRolled = Number(ctx.diceRolled) || 0;
  const baseDamage = Number(ctx.baseDamage) || 0;
  const baseStaggerDamage = Number(ctx.baseStaggerDamage) || 0;
  const baseAttackPower = Number(ctx.baseAttackPower) || 0;
  const baseAttackValue = Number(ctx.baseAttackValue) || 0;
  const baseDefenseValue = Number(ctx.baseDefenseValue) || 0;
  const baseEvadeValue = Number(ctx.baseEvadeValue) || 0;
  const baseSpeed = Number(ctx.baseSpeed) || 0;
  const extraFixedDamage = Number(ctx.extraFixedDamage) || 0;
  const attacksInSameSpeedDie = Number(ctx.attacksInSameSpeedDie) || 0;

  if (END_SCENE_EXPIRE.includes(entry.type)) {
    switch(entry.type){
      case "paralysis":
        return { immediateDamage:0, endSceneDamage:0, endSceneStaggerDamage:0, nextStacks:0, details:`本幕需讓 ${stacks} 個接下來使用的骰子重擲並取較低值；幕結束後移除` };
      case "guard":
        return { immediateDamage:0, endSceneDamage:0, endSceneStaggerDamage:0, nextStacks:0, details:`基礎傷害 ${baseDamage} → 修正後 ${clampMin(baseDamage - stacks, 0)}；幕結束後移除` };
      case "staggerGuard":
        return { immediateDamage:0, endSceneDamage:0, endSceneStaggerDamage:0, nextStacks:0, details:`基礎混亂傷害 ${baseStaggerDamage} → 修正後 ${clampMin(baseStaggerDamage - stacks, 0)}；幕結束後移除` };
      case "strength":
        return { immediateDamage:0, endSceneDamage:0, endSceneStaggerDamage:0, nextStacks:0, details:`攻擊傷害 ${baseAttackPower} → ${baseAttackPower + stacks}；達成值 ${baseAttackValue} → ${clampMin(baseAttackValue + stacks, 1)}；幕結束後移除` };
      case "endurance":
        return { immediateDamage:0, endSceneDamage:0, endSceneStaggerDamage:0, nextStacks:0, details:`防禦值 ${baseDefenseValue} → ${clampMin(baseDefenseValue + stacks, 1)}；迴避值 ${baseEvadeValue} → ${clampMin(baseEvadeValue + stacks, 1)}；幕結束後移除` };
      case "haste":
        return { immediateDamage:0, endSceneDamage:0, endSceneStaggerDamage:0, nextStacks:0, details:`速度值 ${baseSpeed} → ${clampMin(baseSpeed + stacks, 1)}；幕結束後移除` };
    }
  }

  switch(entry.type){
    case "burn":
      return { immediateDamage:0, endSceneDamage:stacks, endSceneStaggerDamage:0, nextStacks:floorTwoThirds(stacks), details:`幕結束傷害 ${stacks}，下一幕層數 ${floorTwoThirds(stacks)}` };
    case "bleed":{
      let total = 0, current = stacks;
      for(let i=0;i<attackRolls;i++){ total += current; current = ceilTwoThirds(current); }
      return { immediateDamage:total, endSceneDamage:0, endSceneStaggerDamage:0, nextStacks:current, details:`${attackRolls} 次攻擊骰後共受傷 ${total}，剩餘層數 ${current}` };
    }
    case "tremor":
      return { immediateDamage:0, endSceneDamage:0, endSceneStaggerDamage:stacks, nextStacks:floorTwoThirds(stacks), details:`幕結束混亂傷害 ${stacks}，下一幕層數 ${floorTwoThirds(stacks)}` };
    case "charge":
      return { immediateDamage:0, endSceneDamage:0, endSceneStaggerDamage:0, nextStacks:clampMax(stacks, 10), details:`目前充能 ${clampMax(stacks,10)} / 10` };
    case "smoke":{
      const capped = clampMax(stacks,10);
      return { immediateDamage:0, endSceneDamage:0, endSceneStaggerDamage:0, nextStacks:Math.max(capped - 1, 0), details:`受到傷害 ${baseDamage} → ${Math.floor(baseDamage * (1 + capped * 0.05))}；值加成 ${capped >= 9 ? "+1" : "0"}；幕末剩 ${Math.max(capped - 1, 0)}` };
    }
    case "fairy":{
      const immediateDamage = diceRolled * stacks;
      return { immediateDamage, endSceneDamage:stacks, endSceneStaggerDamage:0, nextStacks:floorTwoThirds(stacks), details:`擲骰 ${diceRolled} 次即時受傷 ${immediateDamage}；幕末再受 ${stacks}；下一幕 ${floorTwoThirds(stacks)}` };
    }
    case "scorchTremor":
      return { immediateDamage:0, endSceneDamage:stacks + extraFixedDamage, endSceneStaggerDamage:stacks, nextStacks:floorTwoThirds(stacks), details:`幕末受 ${stacks} 混亂傷害 + ${stacks + extraFixedDamage} 固定傷害，下一幕 ${floorTwoThirds(stacks)}` };
    case "duel":
      return { immediateDamage:0, endSceneDamage:0, endSceneStaggerDamage:0, nextStacks:(ctx.contested || ctx.staggered) ? stacks : 0, details:(ctx.contested || ctx.staggered) ? "符合保留條件，狀態維持" : "未拚點且未陷入混亂，幕末解除" };
    case "fatigue":{
      const over = Math.max(attacksInSameSpeedDie - stacks, 0);
      let hitPenalty = 0, damageRate = 1;
      if(over === 1){ hitPenalty = -2; damageRate = 0.5; }
      else if(over === 2){ hitPenalty = -3; damageRate = 0.34; }
      else if(over >= 3){ hitPenalty = -4; damageRate = 0.25; }
      return { immediateDamage:0, endSceneDamage:0, endSceneStaggerDamage:0, nextStacks:stacks, details:`同速骰攻擊 ${attacksInSameSpeedDie} 枚，超出 ${over}；命中 ${hitPenalty}，傷害倍率 ${Math.round(damageRate*100)}%` };
    }
    case "rupture":{
      let total = 0, current = stacks;
      for(let i=0;i<hitByAttackDice;i++){ total += current; current = ceilTwoThirds(current); }
      return { immediateDamage:total, endSceneDamage:0, endSceneStaggerDamage:0, nextStacks:current, details:`被攻擊型骰命中 ${hitByAttackDice} 次，共受傷 ${total}；剩餘層數 ${current}` };
    }
    default:
      return { immediateDamage:0, endSceneDamage:0, endSceneStaggerDamage:0, nextStacks:stacks, details:"尚未定義" };
  }
}

function pushLog(item){
  logs.unshift({ id: Date.now() + Math.random(), ...item });
  logs = logs.slice(0, 12);
}

function updateEntry(id, patch){
  entries = entries.map(x => x.id === id ? { ...x, ...patch } : x);
  render();
}

function instantTriggerGeneric(entryId, consume){
  const entry = entries.find(x => x.id === entryId);
  if(!entry) return;
  const stacks = Number(entry.stacks) || 0;
  let fixedDamage = 0, staggerDamage = 0, nextStacks = stacks, text = "";

  switch(entry.type){
    case "burn":
      fixedDamage = stacks;
      nextStacks = consume ? floorTwoThirds(stacks) : stacks;
      text = `燒傷立刻觸發一次，造成 ${fixedDamage} 固定傷害`;
      break;
    case "bleed":
      fixedDamage = stacks;
      nextStacks = consume ? ceilTwoThirds(stacks) : stacks;
      text = `出血立刻觸發一次，造成 ${fixedDamage} 固定傷害`;
      break;
    case "rupture":
      fixedDamage = stacks;
      nextStacks = consume ? ceilTwoThirds(stacks) : stacks;
      text = `破裂立刻觸發一次，造成 ${fixedDamage} 固定傷害`;
      break;
    case "fairy":
      fixedDamage = stacks;
      nextStacks = consume ? floorTwoThirds(stacks) : stacks;
      text = `妖靈立刻觸發一次，造成 ${fixedDamage} 固定傷害`;
      break;
    case "tremor":
      staggerDamage = stacks;
      nextStacks = consume ? floorTwoThirds(stacks) : stacks;
      text = `震顫立刻觸發一次，造成 ${staggerDamage} 混亂傷害`;
      break;
    case "scorchTremor":
      staggerDamage = stacks;
      fixedDamage = stacks + (Number(ctx.extraFixedDamage) || 0);
      nextStacks = consume ? floorTwoThirds(stacks) : stacks;
      text = `震顫-灼熱立刻觸發一次，造成 ${staggerDamage} 混亂傷害與 ${fixedDamage} 固定傷害`;
      break;
    default:
      return;
  }

  entries = entries.map(x => x.id === entryId ? { ...x, stacks: nextStacks } : x);
  pushLog({
    title: `${getMeta(entry.type).name}｜${consume ? "立刻觸發（消耗層數）" : "立刻觸發（不消耗層數）"}`,
    desc: `${text}；觸發後層數 ${nextStacks}`
  });
  render();
}

function instantTriggerTremorAttack(entryId, consumeMode){
  const entry = entries.find(x => x.id === entryId);
  if(!entry || entry.type !== "tremor") return;

  let current = Number(entry.stacks) || 0;
  const config = TREMOR_ATTACKS[Number(entry.tremorLevel) || 0];
  const bonus = Number(entry.tremorBonus) || 0;
  const hunter = !!entry.hunter;
  const extraFixed = Number(ctx.extraFixedDamage) || 0;
  let staggerTotal = 0;
  let fixedTotal = 0;
  const parts = [];

  if(config.trigger){
    staggerTotal += current;
    parts.push(`先算震顫攻擊：造成 ${current} 混亂傷害`);
    if(!hunter && consumeMode){
      current = floorTwoThirds(current);
      parts.push(`此處選擇消耗層數，因此震顫變為 ${current}`);
    } else if (!hunter) {
      parts.push(`此處選擇不消耗層數，震顫維持 ${current}`);
    } else {
      parts.push(`因為接著要算獵人，震顫攻擊本段先不掉層`);
    }
  } else {
    parts.push(`此等級沒有震顫攻擊的先觸發`);
  }

  if(hunter){
    const scorchBase = current;
    staggerTotal += scorchBase;
    fixedTotal += scorchBase + extraFixed;
    parts.push(`再算獵人：轉成震顫-灼熱並立刻觸發，造成 ${scorchBase} 混亂傷害與 ${scorchBase + extraFixed} 固定傷害`);
    current = consumeMode ? floorTwoThirds(scorchBase) : scorchBase;
    parts.push(`${consumeMode ? "獵人段選擇消耗層數" : "獵人段選擇不消耗層數"}，此時震顫為 ${current}`);
  }

  let addTotal = 0;
  if(config.grants.length){
    const texts = config.grants.map(base => {
      const g = base + bonus;
      addTotal += g;
      return `+${g}`;
    });
    current += addTotal;
    parts.push(`最後才加震顫：${texts.join("、")}，合計 +${addTotal}`);
  } else {
    parts.push(`最後沒有新增震顫`);
  }

  entries = entries.map(x => x.id === entryId ? { ...x, stacks: current } : x);
  pushLog({
    title: `${config.name}${hunter ? " + 獵人" : ""}｜震顫攻擊結算`,
    desc: `${parts.join("；")}。總計造成 ${staggerTotal} 混亂傷害${fixedTotal ? `、${fixedTotal} 固定傷害` : ""}；結算後震顫層數 ${current}`
  });
  render();
}

function render(){
  const entriesBox = document.getElementById("entries");
  const resultsBox = document.getElementById("results");
  const logList = document.getElementById("logList");

  entriesBox.innerHTML = entries.map(entry => {
    const meta = getMeta(entry.type);
    const options = EFFECTS.map(e => `<option value="${e.key}" ${e.key === entry.type ? "selected" : ""}>${e.name}</option>`).join("");
    const tremorOptions = [0,1,2,3,4,5].map(v => `<option value="${v}" ${Number(entry.tremorLevel||0) === v ? "selected" : ""}>${TREMOR_ATTACKS[v].name}</option>`).join("");

    return `
      <div class="entry">
        <div class="row">
          <div>
            <div class="badge">${meta.group}</div>
            <label>狀態名稱</label>
            <select onchange="updateEntryType(${entry.id}, this.value)">${options}</select>
            <div class="note">${meta.note}</div>
          </div>
          <div>
            <label>層數 / 數值 X</label>
            <input type="number" value="${entry.stacks}" oninput="updateEntryStacks(${entry.id}, this.value)">
          </div>
          <div>
            <button class="btn-outline" onclick="removeEntry(${entry.id})">刪除</button>
          </div>
        </div>

        ${isDamageType(entry.type) ? `
        <div class="special-box">
          <div class="small">立刻觸發：直接結算一次該效果；若選擇消耗層數，會依該效果原本的衰減規則更新層數。</div>
          <div class="action-row" style="margin-top:10px;">
            <button class="btn-blue" onclick="instantTriggerGeneric(${entry.id}, false)">立刻觸發（不消耗層數）</button>
            <button class="btn-green" onclick="instantTriggerGeneric(${entry.id}, true)">立刻觸發（消耗層數）</button>
          </div>

          ${entry.type === "tremor" ? `
          <div class="special-box" style="margin-top:12px;">
            <div class="small">震顫攻擊順序：先算震顫攻擊，再算獵人，最後才加震顫。</div>
            <div class="three" style="margin-top:10px;">
              <div>
                <label>選項 1：震顫攻擊等級</label>
                <select onchange="updateEntry(${entry.id}, { tremorLevel: Number(this.value) })">${tremorOptions}</select>
              </div>
              <div>
                <label>選項 2：賦予值加成</label>
                <select onchange="updateEntry(${entry.id}, { tremorBonus: Number(this.value) })">
                  ${Array.from({length:9}, (_,i)=>`<option value="${i}" ${Number(entry.tremorBonus||0)===i ? "selected" : ""}>+${i}</option>`).join("")}
                </select>
              </div>
              <div>
                <label>獵人</label>
                <select onchange="updateEntry(${entry.id}, { hunter: this.value === '1' })">
                  <option value="0" ${!entry.hunter ? "selected" : ""}>未使用</option>
                  <option value="1" ${entry.hunter ? "selected" : ""}>使用獵人</option>
                </select>
              </div>
            </div>
            <div class="sub-row" style="margin-top:10px;">
              <button class="btn-blue" onclick="instantTriggerTremorAttack(${entry.id}, false)">震顫攻擊結算（不消耗層數）</button>
              <button class="btn-green" onclick="instantTriggerTremorAttack(${entry.id}, true)">震顫攻擊結算（消耗層數）</button>
            </div>
          </div>` : ``}
        </div>` : ``}
      </div>
    `;
  }).join("");

  const resolved = entries.map(entry => ({ entry, meta:getMeta(entry.type), result:resolveEntry(entry) }));
  document.getElementById("sumImmediate").textContent = resolved.reduce((s,x)=>s+(x.result.immediateDamage||0),0);
  document.getElementById("sumEndDamage").textContent = resolved.reduce((s,x)=>s+(x.result.endSceneDamage||0),0);
  document.getElementById("sumEndStagger").textContent = resolved.reduce((s,x)=>s+(x.result.endSceneStaggerDamage||0),0);

  document.getElementById("btnContested").textContent = ctx.contested ? "是" : "否";
  document.getElementById("btnContested").className = ctx.contested ? "btn-primary" : "btn-outline";
  document.getElementById("btnStaggered").textContent = ctx.staggered ? "是" : "否";
  document.getElementById("btnStaggered").className = ctx.staggered ? "btn-primary" : "btn-outline";

  resultsBox.innerHTML = resolved.map(item => `
    <div class="result-card">
      <div class="result-head">
        <h3>${item.meta.name}</h3>
        <div class="badge">${item.entry.stacks} 層</div>
      </div>
      <div class="result-desc">${item.result.details}</div>
      <div class="mini-grid">
        <div class="mini"><div class="k">即時傷害</div><div class="v">${item.result.immediateDamage || 0}</div></div>
        <div class="mini"><div class="k">幕末傷害</div><div class="v">${item.result.endSceneDamage || 0}</div></div>
        <div class="mini"><div class="k">幕末混亂傷害</div><div class="v">${item.result.endSceneStaggerDamage || 0}</div></div>
        <div class="mini"><div class="k">下一幕層數</div><div class="v">${item.result.nextStacks ?? item.entry.stacks}</div></div>
      </div>
    </div>
  `).join("");

  logList.innerHTML = logs.length ? logs.map(log => `
    <div class="log-card">
      <h3>${log.title}</h3>
      <div class="log-desc" style="margin-top:8px;">${log.desc}</div>
    </div>
  `).join("") : `<div class="muted">目前還沒有立刻觸發紀錄。</div>`;
}

function updateCtxNum(key, value){ ctx[key] = Number(value); render(); }
function toggleFlag(key){ ctx[key] = !ctx[key]; render(); }
function addEntry(){ entries.push({ id:Date.now(), type:"burn", stacks:1, tremorLevel:0, tremorBonus:0, hunter:false }); render(); }
function removeEntry(id){ entries = entries.filter(x => x.id !== id); render(); }
function updateEntryType(id, type){ entries = entries.map(x => x.id === id ? { ...x, type } : x); render(); }
function updateEntryStacks(id, stacks){ entries = entries.map(x => x.id === id ? { ...x, stacks:Number(stacks) } : x); render(); }

function applyEndScene(){
  entries = entries.map(x => ({ ...x, stacks: resolveEntry(x).nextStacks })).filter(x => Number(x.stacks) > 0);
  pushLog({ title:"套用幕結束", desc:"已依各狀態規則更新到下一幕；強壯、保護、忍耐、迅捷、振奮等本幕型效果會在此時移除。" });
  render();
}

function resetDemo(){
  entries = [
    { id:1, type:"burn", stacks:10, tremorLevel:0, tremorBonus:0, hunter:false },
    { id:2, type:"tremor", stacks:10, tremorLevel:3, tremorBonus:1, hunter:true },
    { id:3, type:"guard", stacks:2, tremorLevel:0, tremorBonus:0, hunter:false }
  ];
  logs = [];
  ctx = {
    attackRolls:2, hitByAttackDice:1, diceRolled:2, baseDamage:10, baseStaggerDamage:8,
    baseAttackPower:5, baseAttackValue:4, baseDefenseValue:4, baseEvadeValue:5,
    baseSpeed:3, extraFixedDamage:0, attacksInSameSpeedDie:1, contested:false, staggered:false
  };
  document.querySelectorAll("input").forEach(el => {
    if(el.id && Object.prototype.hasOwnProperty.call(ctx, el.id)) el.value = ctx[el.id];
  });
  render();
}

resetDemo();
</script>
</body>
</html>
