<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>狀態詞條計算機 v5</title>
<style>
:root{
  --bg:#0b1220;
  --panel:#111827;
  --panel-2:#0f172a;
  --line:#233047;
  --text:#e5e7eb;
  --muted:#94a3b8;
  --soft:#172036;
  --chip:#0b1326;
  --blue:#3b82f6;
  --green:#22c55e;
  --red:#ef4444;
  --gold:#f59e0b;
}
*{box-sizing:border-box}
body{
  margin:0;
  background:
    radial-gradient(circle at top, #1a2740 0%, #0b1220 45%),
    linear-gradient(180deg,#0b1220,#09101d);
  color:var(--text);
  font-family:"Noto Sans TC","Microsoft JhengHei",system-ui,sans-serif;
}
.wrap{
  max-width:1380px;
  margin:auto;
  padding:24px;
}
.hero,.card,.entity{
  background:linear-gradient(180deg,rgba(255,255,255,.03),rgba(255,255,255,.01));
  border:1px solid var(--line);
  border-radius:22px;
  box-shadow:0 18px 40px rgba(0,0,0,.28);
}
.hero,.card{padding:18px}
.hero{
  display:flex;
  justify-content:space-between;
  gap:16px;
  flex-wrap:wrap;
  margin-bottom:18px;
}
h1,h2,h3,p{margin:0}
.muted{color:var(--muted)}
.small{font-size:12px;color:var(--muted);line-height:1.65}
.grid{
  display:grid;
  grid-template-columns:1.25fr .75fr;
  gap:18px;
}
.side{
  display:grid;
  gap:18px;
}
.btns,.rbtns,.toolbar,.titleline{
  display:flex;
  gap:8px;
  flex-wrap:wrap;
  align-items:center;
}
button{
  border:none;
  border-radius:12px;
  padding:10px 14px;
  font-weight:800;
  cursor:pointer;
  transition:.15s transform,.15s opacity;
}
button:hover{transform:translateY(-1px)}
.b1{background:linear-gradient(180deg,#2b364d,#1b2438);color:#fff}
.b2{background:linear-gradient(180deg,#3b82f6,#2563eb);color:#fff}
.b3{background:linear-gradient(180deg,#22c55e,#16a34a);color:#fff}
.bo{background:transparent;color:var(--text);border:1px solid var(--line)}
.bs{background:var(--soft);color:var(--text)}
.br{background:linear-gradient(180deg,#ef4444,#dc2626);color:#fff}
input,select{
  width:100%;
  padding:10px 12px;
  border:1px solid #243041;
  border-radius:12px;
  background:#0b1326;
  color:var(--text);
}
label{
  display:block;
  font-size:12px;
  color:var(--muted);
  font-weight:700;
  margin-bottom:6px;
}
.two{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:12px;
}
.stat{
  background:linear-gradient(180deg,#141f35,#0e1628);
  border:1px solid #22304a;
  border-radius:18px;
  padding:14px;
  margin-bottom:10px;
}
.k{font-size:12px;color:var(--muted)}
.v{font-size:30px;font-weight:900}
.entity{
  padding:16px;
  margin-bottom:14px;
  background:linear-gradient(180deg,#111827,#0c1426);
}
.entityHead{
  display:flex;
  justify-content:space-between;
  gap:10px;
  flex-wrap:wrap;
  align-items:center;
}
.badge{
  display:inline-flex;
  align-items:center;
  gap:6px;
  background:#0b1326;
  border:1px solid #21304b;
  padding:6px 10px;
  border-radius:999px;
  font-size:12px;
  font-weight:700;
}
.sep{
  height:1px;
  background:linear-gradient(90deg,transparent,#243041,transparent);
  margin:12px 0;
}
.panel{
  padding:12px;
  border:1px solid #22304a;
  border-radius:16px;
  background:rgba(11,19,38,.72);
  margin:10px 0;
}
.log{
  display:grid;
  gap:8px;
  max-height:520px;
  overflow:auto;
}
.logitem{
  background:#0b1326;
  border:1px solid #22304a;
  border-radius:14px;
  padding:10px;
  line-height:1.65;
}
.chips{
  display:flex;
  flex-wrap:wrap;
  gap:8px;
}
.chip{
  display:inline-flex;
  align-items:center;
  gap:8px;
  background:var(--chip);
  border:1px solid #22304a;
  border-radius:16px;
  padding:8px 10px;
  min-height:52px;
}
.iconbox{
  width:28px;
  height:28px;
  display:flex;
  align-items:center;
  justify-content:center;
  border-radius:10px;
  font-size:18px;
  background:#10192d;
  border:1px solid #243041;
}
.chip .name{
  font-size:12px;
  color:var(--muted);
  line-height:1.1;
}
.chip .stack{
  font-size:16px;
  font-weight:900;
}
.sectionTitle{
  font-size:14px;
  font-weight:800;
  margin-bottom:8px;
  color:#cbd5e1;
}
.nameinput{width:200px}
@media(max-width:980px){
  .grid{grid-template-columns:1fr}
  .two{grid-template-columns:1fr}
  .nameinput{width:100%}
}
</style>
</head>
<body>
<div class="wrap">
  <div class="hero">
    <div>
      <h1>狀態詞條計算機 v5</h1>
      <p class="muted" style="margin-top:6px">
        加入 v4 已有負面狀態圖標，並把 UI 改成更像遊戲狀態面板。核心結算沿用 v4。
      </p>
    </div>
    <div class="btns">
      <button class="b1" onclick="addEntity()">新增目標</button>
      <button class="bs" onclick="endTurnAll()">幕結束 / 下一幕開始</button>
      <button class="bo" onclick="resetDemo()">重設範例</button>
    </div>
  </div>

  <div class="grid">
    <div class="card">
      <div style="display:flex;justify-content:space-between;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:10px">
        <h2>目標列表</h2>
        <div class="badge">多目標</div>
      </div>
      <div id="entities"></div>
    </div>

    <div class="side">
      <div class="card">
        <h2 style="margin-bottom:10px">戰鬥資訊</h2>
        <div class="stat"><div class="k">目前幕數</div><div id="turnNum" class="v">1</div></div>
        <div class="stat"><div class="k">目標總傷害</div><div id="sumDmg" class="v">0</div></div>
        <div class="stat"><div class="k">目標總混亂</div><div id="sumStg" class="v">0</div></div>
      </div>

      <div class="card">
        <h2 style="margin-bottom:10px">設定</h2>
        <div class="two">
          <div>
            <label>震顫-灼熱額外固定傷害</label>
            <input type="number" id="extraFixed" value="0" oninput="cfg.extraFixed=Number(this.value);render()">
          </div>
          <div>
            <label>震顫攻擊賦予值加成</label>
            <input type="number" id="tremorBonus" value="0" oninput="cfg.tremorBonus=Number(this.value);render()">
          </div>
        </div>
        <div class="small" style="margin-top:10px">
          只加入 v4 已有狀態的圖標。pending 會在「幕結束 / 下一幕開始」後正式加進 debuff。
        </div>
      </div>

      <div class="card">
        <h2 style="margin-bottom:10px">戰鬥紀錄</h2>
        <div id="log" class="log"></div>
      </div>
    </div>
  </div>
</div>

<script>
const ICONS = {
  Burn: "🔥",
  Bleed: "🩸",
  Rupture: "💥",
  Tremor: "🌀",
  Tremor_Burn: "💠",
  Corrosion: "☣️",
  Guard: "🛡️",
  Fragile: "🎯",
  StaggerGuard: "✨",
  Strength: "🟢",
  Down: "🔻",
  Endurance: "🟠",
  Haste: "⚡",
  Paralysis: "🌩️",
  Charge: "🔋"
};

const NOW_OPTIONS = ["震顫","震顫-灼熱","燒傷","出血","破裂","腐蝕"];
const TURN_EXPIRE = ["Strength","Guard","Endurance","Haste","StaggerGuard","Paralysis"];

const TREMOR_ATTACKS = {
  0:{name:"不使用震顫攻擊",trigger:false,grants:[]},
  1:{name:"震顫攻擊 LV1",trigger:false,grants:[1]},
  2:{name:"震顫攻擊 LV2",trigger:true,grants:[2]},
  3:{name:"震顫攻擊 LV3",trigger:true,grants:[2,2]},
  4:{name:"震顫攻擊 LV4",trigger:true,grants:[5]},
  5:{name:"震顫攻擊 LV5",trigger:true,grants:[2,2,2]}
};

const LABELS = {
  Burn:"燒傷",
  Bleed:"出血",
  Rupture:"破裂",
  Tremor:"震顫",
  Tremor_Burn:"震顫-灼熱",
  Corrosion:"腐蝕",
  Guard:"保護/易損",
  StaggerGuard:"振奮",
  Strength:"強壯/虛弱",
  Endurance:"忍耐/破綻",
  Haste:"迅捷/束縛",
  Paralysis:"麻痺",
  Charge:"充能"
};

let turn = 1;
let cfg = { extraFixed:0, tremorBonus:0 };
let logs = [];
let entities = [];

const makeDebuff = () => ({
  Burn:0, Bleed:0, Rupture:0, Tremor:0, Tremor_Burn:0, Corrosion:0,
  Guard:0, StaggerGuard:0, Strength:0, Endurance:0, Haste:0, Paralysis:0, Charge:0
});

const makeEntity = (name) => ({
  id: Date.now() + Math.random(),
  name,
  damage:0,
  stager:0,
  debuff: makeDebuff(),
  pending: makeDebuff(),
  tremorLevel:0,
  hunter:false,
  choice:"震顫"
});

const floor23 = x => Math.floor(x * 2 / 3);
const ceil23 = x => Math.ceil(x * 2 / 3);

const pushLog = t => {
  logs.unshift(t);
  logs = logs.slice(0, 80);
};

function recordActivation(e,n,d=0,s=0,a=0){
  if(d<=0 && s<=0) return;
  pushLog(`「${e.name}」因「${n}」受到「${d}/${s}」點傷害，層數降至「${a}」層，總計傷害為「${e.damage}/${e.stager}」`);
}
function recordSettle(e,n,a){
  pushLog(`「${e.name}」的「${n}」因幕結算而降至「${a}」層`);
}
function recordGain(e,n,g,t){
  pushLog(`「${e.name}」獲得「${g}」層「${n}」，總計層數為「${t}」`);
}

function burnActivation(e, consume=true){
  if(e.debuff.Burn>0){
    const b = e.debuff.Burn;
    e.damage += b;
    if(consume) e.debuff.Burn = floor23(e.debuff.Burn);
    recordActivation(e,"燒傷",b,0,e.debuff.Burn);
  }
}
function bleedActivation(e){
  if(e.debuff.Bleed>0){
    const b = e.debuff.Bleed;
    e.damage += b;
    e.debuff.Bleed = ceil23(e.debuff.Bleed);
    recordActivation(e,"出血",b,0,e.debuff.Bleed);
  }
}
function bleedDecay(e){
  if(e.debuff.Bleed>0){
    e.debuff.Bleed = ceil23(e.debuff.Bleed);
    recordSettle(e,"出血",e.debuff.Bleed);
  }
}
function ruptureActivation(e){
  if(e.debuff.Rupture>0){
    const b = e.debuff.Rupture;
    e.damage += b;
    e.debuff.Rupture = ceil23(e.debuff.Rupture);
    recordActivation(e,"破裂",b,0,e.debuff.Rupture);
  }
}
function ruptureDecay(e){
  if(e.debuff.Rupture>0){
    e.debuff.Rupture = ceil23(e.debuff.Rupture);
    recordSettle(e,"破裂",e.debuff.Rupture);
  }
}
function corrosionActivation(e){
  if(e.debuff.Corrosion>0){
    const b = e.debuff.Corrosion;
    e.damage += b;
    e.stager += b;
    recordActivation(e,"腐蝕",b,b,e.debuff.Corrosion);
  }
}
function corrosionDecay(e){
  if(e.debuff.Corrosion>0){
    e.debuff.Corrosion = ceil23(e.debuff.Corrosion);
    recordSettle(e,"腐蝕",e.debuff.Corrosion);
  }
}
function tremorBurst(e, consume=true){
  if(e.debuff.Tremor>0){
    const b = e.debuff.Tremor;
    e.stager += b;
    if(consume) e.debuff.Tremor = floor23(e.debuff.Tremor);
    recordActivation(e,"震顫",0,b,e.debuff.Tremor);
  }
  if(e.debuff.Tremor_Burn>0){
    const b = e.debuff.Tremor_Burn;
    e.stager += b;
    e.damage += b + Number(cfg.extraFixed || 0);
    burnActivation(e,false);
    if(consume) e.debuff.Tremor_Burn = floor23(e.debuff.Tremor_Burn);
    recordActivation(e,"震顫-灼熱",b + Number(cfg.extraFixed || 0),b,e.debuff.Tremor_Burn);
  }
}
function applyTurnEndForEntity(e){
  burnActivation(e,true);
  tremorBurst(e,true);
  bleedDecay(e);
  ruptureDecay(e);
  corrosionDecay(e);
  TURN_EXPIRE.forEach(k => e.debuff[k] = 0);
}
function incTremorOnDebuff(e){
  if(e.debuff.Tremor_Burn>0) e.debuff.Tremor_Burn += 1;
  else e.debuff.Tremor += 1;
}
function incTremorOnPending(e){
  if(e.pending.Tremor_Burn>0 || e.debuff.Tremor_Burn>0) e.pending.Tremor_Burn += 1;
  else e.pending.Tremor += 1;
}
function grantNow(e, ch){
  if(ch==="震顫") incTremorOnDebuff(e);
  else if(ch==="震顫-灼熱") e.debuff.Tremor_Burn += 1;
  else if(ch==="燒傷") e.debuff.Burn += 1;
  else if(ch==="出血") e.debuff.Bleed += 1;
  else if(ch==="破裂") e.debuff.Rupture += 1;
  else if(ch==="腐蝕") e.debuff.Corrosion += 1;
}
function grantNext(e, ch){
  if(ch==="震顫") incTremorOnPending(e);
  else if(ch==="震顫-灼熱") e.pending.Tremor_Burn += 1;
  else if(ch==="燒傷") e.pending.Burn += 1;
  else if(ch==="出血") e.pending.Bleed += 1;
  else if(ch==="破裂") e.pending.Rupture += 1;
  else if(ch==="腐蝕") e.pending.Corrosion += 1;
}
function flushPending(e){
  const p = e.pending, d = e.debuff;
  if(p.Burn>0){ d.Burn += p.Burn; recordGain(e,"燒傷",p.Burn,d.Burn); }
  if(p.Bleed>0){ d.Bleed += p.Bleed; recordGain(e,"出血",p.Bleed,d.Bleed); }
  if(p.Rupture>0){ d.Rupture += p.Rupture; recordGain(e,"破裂",p.Rupture,d.Rupture); }
  if(p.Tremor>0){ d.Tremor += p.Tremor; recordGain(e,"震顫",p.Tremor,d.Tremor); }
  if(p.Tremor_Burn>0){ d.Tremor_Burn += p.Tremor_Burn; recordGain(e,"震顫-灼熱",p.Tremor_Burn,d.Tremor_Burn); }
  if(p.Corrosion>0){ d.Corrosion += p.Corrosion; recordGain(e,"腐蝕",p.Corrosion,d.Corrosion); }
  e.pending = makeDebuff();
}
function endTurnAll(){
  entities.forEach(applyTurnEndForEntity);
  turn += 1;
  entities.forEach(flushPending);
  pushLog(`===== 第 ${turn} 幕開始 =====`);
  render();
}
function instantTriggerKey(e,k,c){
  if(k==="Burn") burnActivation(e,c);
  else if(k==="Bleed") bleedActivation(e);
  else if(k==="Rupture") ruptureActivation(e);
  else if(k==="Tremor" || k==="Tremor_Burn") tremorBurst(e,c);
  else if(k==="Corrosion") corrosionActivation(e);
  render();
}
function tremorAttack(e, consume){
  const conf = TREMOR_ATTACKS[Number(e.tremorLevel)||0];
  let cur = e.debuff.Tremor;
  const parts = [];
  if(conf.trigger){
    e.stager += cur;
    parts.push(`先算震顫攻擊，造成 ${cur} 混亂傷害`);
  }else{
    parts.push("此等級不先觸發震顫");
  }
  if(e.hunter){
    e.stager += cur;
    e.damage += cur + Number(cfg.extraFixed||0);
    parts.push(`再算獵人，轉為震顫-灼熱並造成 ${cur}/${cur+Number(cfg.extraFixed||0)} 傷害`);
    if(consume) cur = floor23(cur);
    parts.push(`獵人段後震顫為 ${cur}`);
  }else if(conf.trigger && consume){
    cur = floor23(cur);
    parts.push(`震顫攻擊選擇消耗層數，震顫為 ${cur}`);
  }
  let add = 0;
  conf.grants.forEach(v => add += v + Number(cfg.tremorBonus||0));
  cur += add;
  e.debuff.Tremor = cur;
  parts.push(`最後增加震顫 ${add}，目前為 ${cur}`);
  pushLog(`「${e.name}」震顫攻擊：${parts.join("；")}`);
  render();
}

function addEntity(){
  entities.push(makeEntity(`目標${entities.length+1}`));
  render();
}
function resetDemo(){
  turn = 1;
  logs = [`===== 第 1 幕開始 =====`];
  entities = [makeEntity("目標A"), makeEntity("目標B")];

  entities[0].debuff.Burn = 10;
  entities[0].debuff.Tremor = 10;
  entities[0].debuff.Guard = 2;
  entities[0].tremorLevel = 3;
  entities[0].hunter = true;

  entities[1].pending.Bleed = 3;
  entities[1].debuff.Rupture = 4;

  cfg.extraFixed = 0;
  cfg.tremorBonus = 0;
  document.getElementById("extraFixed").value = 0;
  document.getElementById("tremorBonus").value = 0;
  render();
}

function iconFor(key, value=1){
  if(key==="Guard" && Number(value)<0) return ICONS.Fragile || ICONS.Guard;
  if(key==="Strength" && Number(value)<0) return ICONS.Down || ICONS.Strength;
  if(key==="Endurance" && Number(value)<0) return ICONS.Down || ICONS.Endurance;
  if(key==="Haste" && Number(value)<0) return ICONS.Down || ICONS.Haste;
  return ICONS[key] || "•";
}

function chip(key, value, srcName, id){
  const label = LABELS[key] || key;
  const icon = iconFor(key, value);
  const isTriggerable = srcName==="debuff" && ["Burn","Bleed","Rupture","Tremor","Tremor_Burn","Corrosion"].includes(key);

  return `
    <div class="chip">
      <div class="iconbox">${icon}</div>
      <div>
        <div class="name">${srcName==="pending" ? "下一幕 " : ""}${label}</div>
        <div class="stack">${value}</div>
      </div>
      <div class="rbtns">
        <button class="bo" onclick="editStack('${id}','${srcName}','${key}',-1)">-</button>
        <button class="bo" onclick="editStack('${id}','${srcName}','${key}',1)">+</button>
        ${isTriggerable ? `<button class="b2" onclick="instantById('${id}','${key}',false)">觸發</button><button class="b3" onclick="instantById('${id}','${key}',true)">觸發+耗</button>` : ""}
      </div>
    </div>
  `;
}

function chipArea(e, srcName){
  const s = e[srcName];
  const order = ["Burn","Bleed","Rupture","Tremor","Tremor_Burn","Corrosion","Guard","StaggerGuard","Strength","Endurance","Haste","Paralysis","Charge"];
  const items = order
    .filter(k => Number(s[k]) !== 0)
    .map(k => chip(k, s[k], srcName, e.id))
    .join("");
  return items || '<div class="muted">無</div>';
}

function editStack(id, src, k, d){
  const e = entities.find(x => String(x.id)===String(id));
  if(!e) return;
  e[src][k] += d;
  if(e[src][k] < 0 && !["Guard","StaggerGuard","Strength","Endurance","Haste"].includes(k)){
    e[src][k] = 0;
  }
  render();
}
function instantById(id, k, c){
  const e = entities.find(x => String(x.id)===String(id));
  if(e) instantTriggerKey(e, k, c);
}
function renameEntity(id, v){
  const e = entities.find(x => String(x.id)===String(id));
  if(e){ e.name = v; render(); }
}
function clearEntity(id){
  const e = entities.find(x => String(x.id)===String(id));
  if(e){ e.damage = 0; e.stager = 0; render(); }
}
function deleteEntity(id){
  entities = entities.filter(x => String(x.id)!==String(id));
  render();
}
function setChoice(id, v){
  const e = entities.find(x => String(x.id)===String(id));
  if(e){ e.choice = v; render(); }
}
function grantNowById(id){
  const e = entities.find(x => String(x.id)===String(id));
  if(e){ grantNow(e, e.choice); render(); }
}
function grantNextById(id){
  const e = entities.find(x => String(x.id)===String(id));
  if(e){ grantNext(e, e.choice); render(); }
}
function setTremorLevel(id, v){
  const e = entities.find(x => String(x.id)===String(id));
  if(e){ e.tremorLevel = Number(v); render(); }
}
function toggleHunter(id){
  const e = entities.find(x => String(x.id)===String(id));
  if(e){ e.hunter = !e.hunter; render(); }
}
function tremorAttackById(id, c){
  const e = entities.find(x => String(x.id)===String(id));
  if(e) tremorAttack(e, c);
}

function render(){
  document.getElementById("turnNum").textContent = turn;
  document.getElementById("sumDmg").textContent = entities.reduce((s,e)=>s+e.damage,0);
  document.getElementById("sumStg").textContent = entities.reduce((s,e)=>s+e.stager,0);

  document.getElementById("entities").innerHTML = entities.map(e => `
    <div class="entity">
      <div class="entityHead">
        <div class="titleline">
          <span class="badge">目標</span>
          <input class="nameinput" value="${e.name}" oninput="renameEntity('${e.id}',this.value)">
          <span class="badge">傷害 ${e.damage}</span>
          <span class="badge">混亂 ${e.stager}</span>
        </div>
        <div class="rbtns">
          <button class="bs" onclick="clearEntity('${e.id}')">清除傷害/混亂</button>
          <button class="br" onclick="deleteEntity('${e.id}')">刪除目標</button>
        </div>
      </div>

      <div class="panel">
        <div class="two">
          <div>
            <label>賦予選項</label>
            <select onchange="setChoice('${e.id}',this.value)">
              ${NOW_OPTIONS.map(v => `<option value="${v}" ${e.choice===v ? "selected" : ""}>${v}</option>`).join("")}
            </select>
          </div>
          <div>
            <label>震顫攻擊</label>
            <select onchange="setTremorLevel('${e.id}',this.value)">
              ${Object.entries(TREMOR_ATTACKS).map(([k,v]) => `<option value="${k}" ${Number(e.tremorLevel)===Number(k) ? "selected" : ""}>${v.name}</option>`).join("")}
            </select>
          </div>
        </div>

        <div class="toolbar" style="margin-top:10px">
          <button class="b2" onclick="grantNowById('${e.id}')">賦予</button>
          <button class="b3" onclick="grantNextById('${e.id}')">下一幕賦予減益</button>
          <button class="${e.hunter ? 'b1' : 'bo'}" onclick="toggleHunter('${e.id}')">獵人：${e.hunter ? '開' : '關'}</button>
          <button class="b2" onclick="tremorAttackById('${e.id}',false)">震顫攻擊結算</button>
          <button class="b3" onclick="tremorAttackById('${e.id}',true)">震顫攻擊結算+消耗</button>
        </div>
      </div>

      <div class="sectionTitle">當前減益</div>
      <div class="chips">${chipArea(e,"debuff")}</div>

      <div class="sep"></div>

      <div class="sectionTitle">下一幕減益</div>
      <div class="chips">${chipArea(e,"pending")}</div>
    </div>
  `).join("");

  document.getElementById("log").innerHTML =
    logs.map(x => `<div class="logitem">${x}</div>`).join("") ||
    '<div class="muted">目前沒有紀錄。</div>';
}

resetDemo();
</script>
</body>
</html>
