<!doctype html>
<html lang="zh-Hant"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>狀態詞條計算機 v4</title>
<style>
body{font-family:"Noto Sans TC","Microsoft JhengHei",sans-serif;background:#f6f7fb;margin:0;color:#111827}
.wrap{max-width:1280px;margin:auto;padding:24px}.card,.entity{background:#fff;border:1px solid #e5e7eb;border-radius:18px;padding:16px;box-shadow:0 4px 14px rgba(15,23,42,.04)}
.hero{display:flex;justify-content:space-between;gap:12px;flex-wrap:wrap;margin-bottom:18px}.grid{display:grid;grid-template-columns:1.2fr .8fr;gap:18px}
button{border:none;border-radius:10px;padding:9px 12px;font-weight:700;cursor:pointer}.b1{background:#111827;color:#fff}.b2{background:#2563eb;color:#fff}.b3{background:#16a34a;color:#fff}.bo{background:#fff;border:1px solid #e5e7eb}.bs{background:#f3f4f6}
input,select{width:100%;padding:9px 10px;border:1px solid #e5e7eb;border-radius:10px}.row{display:grid;grid-template-columns:1fr auto;gap:8px;align-items:center;padding:6px 0;border-bottom:1px dashed #e5e7eb}.row:last-child{border:none}
.stat{background:#f3f4f6;border-radius:14px;padding:12px;margin-bottom:10px}.k{font-size:12px;color:#6b7280}.v{font-size:28px;font-weight:900}
.muted{color:#6b7280}.panel{padding:12px;border:1px dashed #e5e7eb;border-radius:14px;background:#fafafa;margin:10px 0}.log{display:grid;gap:8px;max-height:520px;overflow:auto}.logitem{background:#fff;border:1px solid #e5e7eb;border-radius:12px;padding:10px}
.small{font-size:12px;color:#6b7280;line-height:1.6}.sep{height:1px;background:#e5e7eb;margin:10px 0}.rbtns{display:flex;gap:6px;flex-wrap:wrap}.badge{display:inline-block;background:#f3f4f6;border-radius:999px;padding:4px 10px;font-size:12px;font-weight:700}
@media(max-width:980px){.grid{grid-template-columns:1fr}}
</style></head><body><div class="wrap">
<div class="hero card"><div><h1 style="margin:0">狀態詞條計算機 v4</h1><div class="muted">對齊你那份 Tkinter 核心：幕末先燒傷、再震顫-灼熱、最後出血/破裂/腐蝕衰減，並有下一幕 pending 生效。</div></div>
<div class="rbtns"><button class="b1" onclick="addEntity()">新增目標</button><button class="bs" onclick="endTurnAll()">幕結束 / 下一幕開始</button><button class="bo" onclick="resetDemo()">重設範例</button></div></div>
<div class="grid">
<div class="card"><h2 style="margin-top:0">目標列表</h2><div id="entities"></div></div>
<div style="display:grid;gap:18px">
<div class="card"><h2 style="margin-top:0">全域資訊</h2><div class="stat"><div class="k">目前幕數</div><div id="turnNum" class="v">1</div></div><div class="stat"><div class="k">目標總傷害</div><div id="sumDmg" class="v">0</div></div><div class="stat"><div class="k">目標總混亂</div><div id="sumStg" class="v">0</div></div></div>
<div class="card"><h2 style="margin-top:0">設定</h2><label>震顫-灼熱額外固定傷害</label><input type="number" id="extraFixed" value="0" oninput="cfg.extraFixed=Number(this.value);render()"><label style="margin-top:10px;display:block">震顫攻擊賦予值加成</label><input type="number" id="tremorBonus" value="0" oninput="cfg.tremorBonus=Number(this.value);render()"><div class="small" style="margin-top:10px">pending 會在「幕結束 / 下一幕開始」後正式加進 debuff。</div></div>
<div class="card"><h2 style="margin-top:0">歷史紀錄</h2><div id="log" class="log"></div></div>
</div></div></div>
<script>
const NOW_OPTIONS=["震顫","震顫-灼熱","燒傷","出血","破裂","腐蝕"];
const TURN_EXPIRE=["Strength","Guard","Endurance","Haste","StaggerGuard","Paralysis"];
const TREMOR_ATTACKS={0:{name:"不使用震顫攻擊",trigger:false,grants:[]},1:{name:"震顫攻擊 LV1",trigger:false,grants:[1]},2:{name:"震顫攻擊 LV2",trigger:true,grants:[2]},3:{name:"震顫攻擊 LV3",trigger:true,grants:[2,2]},4:{name:"震顫攻擊 LV4",trigger:true,grants:[5]},5:{name:"震顫攻擊 LV5",trigger:true,grants:[2,2,2]}};
let turn=1,cfg={extraFixed:0,tremorBonus:0},logs=[],entities=[];
const makeDebuff=()=>({Burn:0,Bleed:0,Rupture:0,Tremor:0,Tremor_Burn:0,Corrosion:0,Guard:0,StaggerGuard:0,Strength:0,Endurance:0,Haste:0,Paralysis:0});
const makeEntity=n=>({id:Date.now()+Math.random(),name:n,damage:0,stager:0,debuff:makeDebuff(),pending:makeDebuff(),tremorLevel:0,hunter:false,choice:"震顫"});
const floor23=x=>Math.floor(x*2/3), ceil23=x=>Math.ceil(x*2/3);
const pushLog=t=>{logs.unshift(t);logs=logs.slice(0,80)}
function recordActivation(e,n,d=0,s=0,a=0){if(d<=0&&s<=0)return;pushLog(`「${e.name}」因「${n}」受到「${d}/${s}」點傷害，層數降至「${a}」層，總計傷害為「${e.damage}/${e.stager}」`)}
function recordSettle(e,n,a){pushLog(`「${e.name}」的「${n}」因幕結算而降至「${a}」層`)}
function recordGain(e,n,g,t){pushLog(`「${e.name}」獲得「${g}」層「${n}」，總計層數為「${t}」`)}
function burnActivation(e,c=true){if(e.debuff.Burn>0){let b=e.debuff.Burn;e.damage+=b;if(c)e.debuff.Burn=floor23(e.debuff.Burn);recordActivation(e,"燒傷",b,0,e.debuff.Burn)}}
function bleedActivation(e){if(e.debuff.Bleed>0){let b=e.debuff.Bleed;e.damage+=b;e.debuff.Bleed=ceil23(e.debuff.Bleed);recordActivation(e,"出血",b,0,e.debuff.Bleed)}}
function bleedDecay(e){if(e.debuff.Bleed>0){e.debuff.Bleed=ceil23(e.debuff.Bleed);recordSettle(e,"出血",e.debuff.Bleed)}}
function ruptureActivation(e){if(e.debuff.Rupture>0){let b=e.debuff.Rupture;e.damage+=b;e.debuff.Rupture=ceil23(e.debuff.Rupture);recordActivation(e,"破裂",b,0,e.debuff.Rupture)}}
function ruptureDecay(e){if(e.debuff.Rupture>0){e.debuff.Rupture=ceil23(e.debuff.Rupture);recordSettle(e,"破裂",e.debuff.Rupture)}}
function corrosionActivation(e){if(e.debuff.Corrosion>0){let b=e.debuff.Corrosion;e.damage+=b;e.stager+=b;recordActivation(e,"腐蝕",b,b,e.debuff.Corrosion)}}
function corrosionDecay(e){if(e.debuff.Corrosion>0){e.debuff.Corrosion=ceil23(e.debuff.Corrosion);recordSettle(e,"腐蝕",e.debuff.Corrosion)}}
function tremorBurst(e,c=true){if(e.debuff.Tremor>0){let b=e.debuff.Tremor;e.stager+=b;if(c)e.debuff.Tremor=floor23(e.debuff.Tremor);recordActivation(e,"震顫",0,b,e.debuff.Tremor)}
if(e.debuff.Tremor_Burn>0){let b=e.debuff.Tremor_Burn;e.stager+=b;e.damage+=b+Number(cfg.extraFixed||0);burnActivation(e,false);if(c)e.debuff.Tremor_Burn=floor23(e.debuff.Tremor_Burn);recordActivation(e,"震顫-灼熱",b+Number(cfg.extraFixed||0),b,e.debuff.Tremor_Burn)}}
function applyTurnEndForEntity(e){burnActivation(e,true);tremorBurst(e,true);bleedDecay(e);ruptureDecay(e);corrosionDecay(e);TURN_EXPIRE.forEach(k=>e.debuff[k]=0)}
function incTremorOnDebuff(e){if(e.debuff.Tremor_Burn>0)e.debuff.Tremor_Burn+=1;else e.debuff.Tremor+=1}
function incTremorOnPending(e){if(e.pending.Tremor_Burn>0||e.debuff.Tremor_Burn>0)e.pending.Tremor_Burn+=1;else e.pending.Tremor+=1}
function grantNow(e,ch){if(ch==="震顫")incTremorOnDebuff(e);else if(ch==="震顫-灼熱")e.debuff.Tremor_Burn+=1;else if(ch==="燒傷")e.debuff.Burn+=1;else if(ch==="出血")e.debuff.Bleed+=1;else if(ch==="破裂")e.debuff.Rupture+=1;else if(ch==="腐蝕")e.debuff.Corrosion+=1}
function grantNext(e,ch){if(ch==="震顫")incTremorOnPending(e);else if(ch==="震顫-灼熱")e.pending.Tremor_Burn+=1;else if(ch==="燒傷")e.pending.Burn+=1;else if(ch==="出血")e.pending.Bleed+=1;else if(ch==="破裂")e.pending.Rupture+=1;else if(ch==="腐蝕")e.pending.Corrosion+=1}
function flushPending(e){let p=e.pending,d=e.debuff;if(p.Burn>0){d.Burn+=p.Burn;recordGain(e,"燒傷",p.Burn,d.Burn)} if(p.Bleed>0){d.Bleed+=p.Bleed;recordGain(e,"出血",p.Bleed,d.Bleed)} if(p.Rupture>0){d.Rupture+=p.Rupture;recordGain(e,"破裂",p.Rupture,d.Rupture)} if(p.Tremor>0){d.Tremor+=p.Tremor;recordGain(e,"震顫",p.Tremor,d.Tremor)} if(p.Tremor_Burn>0){d.Tremor_Burn+=p.Tremor_Burn;recordGain(e,"震顫-灼熱",p.Tremor_Burn,d.Tremor_Burn)} if(p.Corrosion>0){d.Corrosion+=p.Corrosion;recordGain(e,"腐蝕",p.Corrosion,d.Corrosion)} e.pending=makeDebuff()}
function endTurnAll(){entities.forEach(applyTurnEndForEntity);turn+=1;entities.forEach(flushPending);pushLog(`===== 第 ${turn} 幕開始 =====`);render()}
function instantTriggerKey(e,k,c){if(k==="Burn")burnActivation(e,c);else if(k==="Bleed")bleedActivation(e);else if(k==="Rupture")ruptureActivation(e);else if(k==="Tremor"||k==="Tremor_Burn")tremorBurst(e,c);else if(k==="Corrosion")corrosionActivation(e);render()}
function tremorAttack(e,consume){let conf=TREMOR_ATTACKS[Number(e.tremorLevel)||0],cur=e.debuff.Tremor,parts=[];if(conf.trigger){e.stager+=cur;parts.push(`先算震顫攻擊，造成 ${cur} 混亂傷害`)}else parts.push("此等級不先觸發震顫");
if(e.hunter){e.stager+=cur;e.damage+=cur+Number(cfg.extraFixed||0);parts.push(`再算獵人，轉為震顫-灼熱並造成 ${cur}/${cur+Number(cfg.extraFixed||0)} 傷害`);if(consume)cur=floor23(cur);parts.push(`獵人段後震顫為 ${cur}`)}
else if(conf.trigger&&consume){cur=floor23(cur);parts.push(`震顫攻擊選擇消耗層數，震顫為 ${cur}`)}
let add=0;conf.grants.forEach(v=>add+=v+Number(cfg.tremorBonus||0));cur+=add;e.debuff.Tremor=cur;parts.push(`最後增加震顫 ${add}，目前為 ${cur}`);pushLog(`「${e.name}」震顫攻擊：${parts.join("；")}`);render()}
function addEntity(){entities.push(makeEntity(`目標${entities.length+1}`));render()}
function resetDemo(){turn=1;logs=[`===== 第 1 幕開始 =====`];entities=[makeEntity("目標A"),makeEntity("目標B")];entities[0].debuff.Burn=10;entities[0].debuff.Tremor=10;entities[0].debuff.Guard=2;entities[0].tremorLevel=3;entities[0].hunter=true;entities[1].pending.Bleed=3;entities[1].debuff.Rupture=4;cfg.extraFixed=0;cfg.tremorBonus=0;document.getElementById("extraFixed").value=0;document.getElementById("tremorBonus").value=0;render()}
function debuffRows(e,srcName){let s=e[srcName],map=[["Burn","燒傷"],["Bleed","出血"],["Rupture","破裂"],["Tremor","震顫"],["Tremor_Burn","震顫-灼熱"],["Corrosion","腐蝕"],["Guard","保護/易損"],["StaggerGuard","振奮"],["Strength","強壯/虛弱"],["Endurance","忍耐/破綻"],["Haste","迅捷/束縛"],["Paralysis","麻痺"]];
let out=map.filter(([k])=>Number(s[k])!==0).map(([k,n])=>`<div class="row"><div><b>${srcName==="pending"?"下一幕 ":""}${n}</b>：${s[k]}</div><div class="rbtns"><button class="bo" onclick="editStack('${e.id}','${srcName}','${k}',-1)">-</button><button class="bo" onclick="editStack('${e.id}','${srcName}','${k}',1)">+</button>${srcName==="debuff"&&["Burn","Bleed","Rupture","Tremor","Tremor_Burn","Corrosion"].includes(k)?`<button class="b2" onclick="instantById('${e.id}','${k}',false)">立刻觸發</button><button class="b3" onclick="instantById('${e.id}','${k}',true)">立刻觸發+消耗</button>`:""}</div></div>`).join("");
return out||'<div class="muted">無</div>'}
function editStack(id,src,k,d){let e=entities.find(x=>String(x.id)===String(id));if(!e)return;e[src][k]+=d;if(e[src][k]<0)e[src][k]=0;render()}
function instantById(id,k,c){let e=entities.find(x=>String(x.id)===String(id));if(e)instantTriggerKey(e,k,c)}
function renameEntity(id,v){let e=entities.find(x=>String(x.id)===String(id));if(e){e.name=v;render()}}
function clearEntity(id){let e=entities.find(x=>String(x.id)===String(id));if(e){e.damage=0;e.stager=0;render()}}
function deleteEntity(id){entities=entities.filter(x=>String(x.id)!==String(id));render()}
function setChoice(id,v){let e=entities.find(x=>String(x.id)===String(id));if(e){e.choice=v;render()}}
function grantNowById(id){let e=entities.find(x=>String(x.id)===String(id));if(e){grantNow(e,e.choice);render()}}
function grantNextById(id){let e=entities.find(x=>String(x.id)===String(id));if(e){grantNext(e,e.choice);render()}}
function setTremorLevel(id,v){let e=entities.find(x=>String(x.id)===String(id));if(e){e.tremorLevel=Number(v);render()}}
function toggleHunter(id){let e=entities.find(x=>String(x.id)===String(id));if(e){e.hunter=!e.hunter;render()}}
function tremorAttackById(id,c){let e=entities.find(x=>String(x.id)===String(id));if(e)tremorAttack(e,c)}
function render(){document.getElementById("turnNum").textContent=turn;document.getElementById("sumDmg").textContent=entities.reduce((s,e)=>s+e.damage,0);document.getElementById("sumStg").textContent=entities.reduce((s,e)=>s+e.stager,0);
document.getElementById("entities").innerHTML=entities.map(e=>`<div class="entity"><div style="display:flex;justify-content:space-between;gap:10px;flex-wrap:wrap"><div class="rbtns"><span class="badge">名稱</span><input value="${e.name}" oninput="renameEntity('${e.id}',this.value)" style="width:180px"><span class="badge">傷害 ${e.damage}</span><span class="badge">混亂 ${e.stager}</span></div><div class="rbtns"><button class="bs" onclick="clearEntity('${e.id}')">清除傷害/混亂</button><button class="red" onclick="deleteEntity('${e.id}')">刪除目標</button></div></div>
<div class="panel"><label>賦予選項</label><select onchange="setChoice('${e.id}',this.value)">${NOW_OPTIONS.map(v=>`<option value="${v}" ${e.choice===v?"selected":""}>${v}</option>`).join("")}</select><div class="rbtns" style="margin-top:8px"><button class="b2" onclick="grantNowById('${e.id}')">賦予</button><button class="b3" onclick="grantNextById('${e.id}')">下一幕賦予減益</button></div><div class="sep"></div><label>震顫攻擊</label><select onchange="setTremorLevel('${e.id}',this.value)">${Object.entries(TREMOR_ATTACKS).map(([k,v])=>`<option value="${k}" ${Number(e.tremorLevel)===Number(k)?"selected":""}>${v.name}</option>`).join("")}</select><div class="rbtns" style="margin-top:8px"><button class="${e.hunter?'b1':'bo'}" onclick="toggleHunter('${e.id}')">獵人：${e.hunter?'開':'關'}</button><button class="b2" onclick="tremorAttackById('${e.id}',false)">震顫攻擊結算</button><button class="b3" onclick="tremorAttackById('${e.id}',true)">震顫攻擊結算+消耗</button></div></div>
<div><b>當前減益</b></div>${debuffRows(e,"debuff")}<div class="sep"></div><div><b>下一幕減益</b></div>${debuffRows(e,"pending")}</div>`).join("");
document.getElementById("log").innerHTML=logs.map(x=>`<div class="logitem">${x}</div>`).join("")||'<div class="muted">目前沒有紀錄。</div>'}
resetDemo();
</script></body></html>
