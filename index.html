<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>狀態詞條計算機</title>
  <style>
    :root{
      --bg:#f6f7fb;
      --card:#ffffff;
      --text:#1f2937;
      --sub:#6b7280;
      --line:#e5e7eb;
      --accent:#111827;
      --soft:#f3f4f6;
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      font-family: "Noto Sans TC","Microsoft JhengHei",system-ui,sans-serif;
      background:var(--bg);
      color:var(--text);
    }
    .wrap{
      max-width:1200px;
      margin:0 auto;
      padding:24px;
    }
    .hero,.card{
      background:var(--card);
      border:1px solid var(--line);
      border-radius:24px;
      box-shadow:0 4px 16px rgba(15,23,42,.04);
    }
    .hero{
      padding:24px;
      display:flex;
      justify-content:space-between;
      align-items:flex-start;
      gap:16px;
      margin-bottom:24px;
      flex-wrap:wrap;
    }
    h1,h2,h3,p{margin:0}
    .hero p{color:var(--sub); margin-top:8px; line-height:1.7}
    .btns{display:flex; gap:10px; flex-wrap:wrap}
    button{
      border:none;
      border-radius:14px;
      padding:12px 16px;
      cursor:pointer;
      font-size:14px;
      font-weight:700;
    }
    .btn-primary{background:var(--accent); color:white}
    .btn-secondary{background:var(--soft); color:var(--text)}
    .btn-outline{background:white; color:var(--text); border:1px solid var(--line)}
    .grid{
      display:grid;
      grid-template-columns:1.2fr .8fr;
      gap:24px;
    }
    .card{padding:20px}
    .section-title{font-size:20px; font-weight:800; margin-bottom:16px}
    .entry{
      border:1px solid var(--line);
      border-radius:18px;
      padding:16px;
      margin-bottom:14px;
      background:#fff;
    }
    .row{
      display:grid;
      grid-template-columns:1.2fr .6fr auto;
      gap:14px;
      align-items:start;
    }
    label{
      display:block;
      font-size:13px;
      font-weight:700;
      margin-bottom:6px;
      color:var(--sub);
    }
    input,select{
      width:100%;
      border:1px solid var(--line);
      border-radius:12px;
      padding:10px 12px;
      font-size:14px;
      background:white;
    }
    .note{
      margin-top:8px;
      color:var(--sub);
      line-height:1.7;
      font-size:14px;
    }
    .badge{
      display:inline-block;
      background:var(--soft);
      border-radius:999px;
      padding:6px 10px;
      font-size:12px;
      font-weight:700;
      margin-bottom:8px;
    }
    .stat-grid{
      display:grid;
      gap:12px;
    }
    .stat{
      background:var(--soft);
      border-radius:18px;
      padding:16px;
    }
    .stat-label{
      font-size:13px;
      color:var(--sub);
      margin-bottom:6px;
    }
    .stat-value{
      font-size:30px;
      font-weight:900;
    }
    .fields{
      display:grid;
      gap:12px;
    }
    .two{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:12px;
    }
    .toggle{
      display:flex;
      justify-content:space-between;
      align-items:center;
      border:1px solid var(--line);
      border-radius:16px;
      padding:12px 14px;
      background:white;
      font-size:14px;
    }
    .toggle button{
      min-width:56px;
      padding:8px 12px;
    }
    .results{
      margin-top:24px;
    }
    .result-card{
      border:1px solid var(--line);
      border-radius:18px;
      padding:16px;
      margin-bottom:14px;
      background:white;
    }
    .result-head{
      display:flex;
      gap:10px;
      align-items:center;
      flex-wrap:wrap;
      margin-bottom:8px;
    }
    .result-desc{
      color:var(--text);
      line-height:1.7;
      font-size:14px;
      margin-bottom:12px;
    }
    .mini-grid{
      display:grid;
      grid-template-columns:repeat(4,1fr);
      gap:10px;
    }
    .mini{
      background:var(--soft);
      padding:12px;
      border-radius:14px;
    }
    .mini .k{font-size:12px; color:var(--sub); margin-bottom:4px}
    .mini .v{font-size:22px; font-weight:900}
    .help{
      margin-top:12px;
      color:var(--sub);
      font-size:13px;
      line-height:1.7;
    }
    @media (max-width: 900px){
      .grid{grid-template-columns:1fr}
      .row{grid-template-columns:1fr}
      .two{grid-template-columns:1fr}
      .mini-grid{grid-template-columns:1fr 1fr}
    }
    @media (max-width: 560px){
      .mini-grid{grid-template-columns:1fr}
      .wrap{padding:16px}
      .hero,.card{border-radius:18px}
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="hero">
      <div>
        <h1>狀態詞條計算機</h1>
        <p>專門處理燒傷、出血、震顫、煙、力竭、妖靈、破裂等詞條的本幕與幕結束計算。</p>
      </div>
      <div class="btns">
        <button class="btn-primary" onclick="addEntry()">新增狀態</button>
        <button class="btn-secondary" onclick="applyEndScene()">套用幕結束</button>
        <button class="btn-outline" onclick="resetDemo()">重設範例</button>
      </div>
    </div>

    <div class="grid">
      <div class="card">
        <div class="section-title">狀態列表</div>
        <div id="entries"></div>
      </div>

      <div style="display:grid; gap:24px;">
        <div class="card">
          <div class="section-title">總結</div>
          <div class="stat-grid">
            <div class="stat">
              <div class="stat-label">本幕即時固定傷害</div>
              <div class="stat-value" id="sumImmediate">0</div>
            </div>
            <div class="stat">
              <div class="stat-label">幕結束固定傷害</div>
              <div class="stat-value" id="sumEndDamage">0</div>
            </div>
            <div class="stat">
              <div class="stat-label">幕結束混亂傷害</div>
              <div class="stat-value" id="sumEndStagger">0</div>
            </div>
          </div>
        </div>

        <div class="card">
          <div class="section-title">計算條件</div>
          <div class="fields">
            <div class="two">
              <div>
                <label>本幕攻擊型骰子擲出次數</label>
                <input type="number" id="attackRolls" value="2" oninput="updateCtxNum('attackRolls', this.value)">
              </div>
              <div>
                <label>本幕被攻擊型骰命中次數</label>
                <input type="number" id="hitByAttackDice" value="1" oninput="updateCtxNum('hitByAttackDice', this.value)">
              </div>
            </div>

            <div class="two">
              <div>
                <label>本幕總擲骰次數</label>
                <input type="number" id="diceRolled" value="2" oninput="updateCtxNum('diceRolled', this.value)">
              </div>
              <div>
                <label>同一速度骰內使用的攻擊骰數</label>
                <input type="number" id="attacksInSameSpeedDie" value="1" oninput="updateCtxNum('attacksInSameSpeedDie', this.value)">
              </div>
            </div>

            <div class="two">
              <div>
                <label>基礎受到傷害</label>
                <input type="number" id="baseDamage" value="10" oninput="updateCtxNum('baseDamage', this.value)">
              </div>
              <div>
                <label>基礎受到混亂傷害</label>
                <input type="number" id="baseStaggerDamage" value="8" oninput="updateCtxNum('baseStaggerDamage', this.value)">
              </div>
            </div>

            <div class="two">
              <div>
                <label>攻擊骰基礎傷害</label>
                <input type="number" id="baseAttackPower" value="5" oninput="updateCtxNum('baseAttackPower', this.value)">
              </div>
              <div>
                <label>攻擊骰基礎達成值</label>
                <input type="number" id="baseAttackValue" value="4" oninput="updateCtxNum('baseAttackValue', this.value)">
              </div>
            </div>

            <div class="two">
              <div>
                <label>防禦骰基礎達成值</label>
                <input type="number" id="baseDefenseValue" value="4" oninput="updateCtxNum('baseDefenseValue', this.value)">
              </div>
              <div>
                <label>迴避骰基礎達成值</label>
                <input type="number" id="baseEvadeValue" value="5" oninput="updateCtxNum('baseEvadeValue', this.value)">
              </div>
            </div>

            <div class="two">
              <div>
                <label>基礎速度值</label>
                <input type="number" id="baseSpeed" value="3" oninput="updateCtxNum('baseSpeed', this.value)">
              </div>
              <div>
                <label>震顫-灼熱額外固定傷害</label>
                <input type="number" id="extraFixedDamage" value="0" oninput="updateCtxNum('extraFixedDamage', this.value)">
              </div>
            </div>

            <div class="toggle">
              <span>本幕有與施加者拚點</span>
              <button id="btnContested" class="btn-outline" onclick="toggleFlag('contested')">否</button>
            </div>
            <div class="toggle">
              <span>自身已陷入混亂</span>
              <button id="btnStaggered" class="btn-outline" onclick="toggleFlag('staggered')">否</button>
            </div>
          </div>
          <div class="help">提示：保護/易損、強壯/虛弱、迅捷/束縛 這類狀態可用正負值表示。例如 -2 就代表易損 / 虛弱 / 束縛。</div>
        </div>
      </div>
    </div>

    <div class="card results">
      <div class="section-title">逐條結果</div>
      <div id="results"></div>
    </div>
  </div>

  <script>
    const EFFECTS = [
      { key:"burn", name:"燒傷", group:"持續傷害", note:"每一幕結束時，受到 X 點傷害，數值減少至 2/3，向下取整。" },
      { key:"bleed", name:"出血", group:"持續傷害", note:"本幕中每次擲出攻擊型骰子後，受到 X 點傷害，數值減少至 2/3，向上取整。" },
      { key:"tremor", name:"震顫", group:"混亂傷害", note:"每一幕結束時，受到 X 點混亂傷害，數值減少至 2/3，向下取整。" },
      { key:"paralysis", name:"麻痺", group:"擲骰干擾", note:"本幕接下來要使用的骰子中，選出 X 個骰子重擲 1 次並取較低值。" },
      { key:"guard", name:"保護 / 易損", group:"傷害修正", note:"本幕中受到的傷害減少 ±X，最低不低於 0。正值視為保護，負值視為易損。" },
      { key:"staggerGuard", name:"振奮", group:"混亂傷害修正", note:"本幕中受到攻擊時的混亂傷害減少 ±X，最低不低於 0。" },
      { key:"strength", name:"強壯 / 虛弱", group:"攻擊修正", note:"本幕中攻擊骰的傷害、達成值 ±X；達成值最低 1。" },
      { key:"endurance", name:"忍耐 / 破綻", group:"防禦修正", note:"本幕中防禦骰、迴避骰的達成值與效力值 ±X；達成值最低 1。" },
      { key:"haste", name:"迅捷 / 束縛", group:"速度修正", note:"本幕中速度值 ±X；最低 1。" },
      { key:"charge", name:"充能", group:"特殊資源", note:"根據充能數值提升特定戰鬥特技能力。最大 10 層。" },
      { key:"smoke", name:"煙", group:"特殊增傷", note:"受到的傷害量增加 (X×5)%，最大 10 層；若 X≥9，攻擊/防禦/迴避值 +1；幕結束時 -1。" },
      { key:"fairy", name:"妖靈", group:"持續傷害", note:"每當擲出骰子時受到 X 點傷害；每一幕結束時再受到 X 點傷害，數值減少至 2/3，向下取整。" },
      { key:"scorchTremor", name:"震顫-灼熱", group:"複合效果", note:"被視作震顫；幕結束時受到 X 點混亂傷害與固定傷害，層數降低至 2/3，並且觸發燒傷。" },
      { key:"duel", name:"決鬥", group:"條件狀態", note:"幕結束時若持有者未與施加者拚點，解除該狀態；若自身陷入混亂，則不適用解除。" },
      { key:"fatigue", name:"力竭", group:"連續攻擊懲罰", note:"同一速度骰使用的攻擊骰每超出力竭 X 1 枚，命中 -2/-3/-4，傷害 -50%/-66%/-75%。" },
      { key:"rupture", name:"破裂", group:"持續傷害", note:"本幕中每次被攻擊型骰子命中時，受到 X 點傷害，數值減少至 2/3，向上取整。" },
    ];

    let entries = [
      { id: 1, type: "burn", stacks: 3 },
      { id: 2, type: "bleed", stacks: 4 }
    ];

    let ctx = {
      attackRolls: 2,
      hitByAttackDice: 1,
      diceRolled: 2,
      baseDamage: 10,
      baseStaggerDamage: 8,
      baseAttackPower: 5,
      baseAttackValue: 4,
      baseDefenseValue: 4,
      baseEvadeValue: 5,
      baseSpeed: 3,
      extraFixedDamage: 0,
      attacksInSameSpeedDie: 1,
      contested: false,
      staggered: false,
    };

    function floorTwoThirds(x){ return Math.floor((x*2)/3); }
    function ceilTwoThirds(x){ return Math.ceil((x*2)/3); }
    function clampMin(v, min){ return Math.max(v, min); }
    function clampMax(v, max){ return Math.min(v, max); }
    function getMeta(key){ return EFFECTS.find(e=>e.key===key); }

    function resolveEntry(entry){
      const stacks = Number(entry.stacks) || 0;
      const attackRolls = Number(ctx.attackRolls) || 0;
      const hitByAttackDice = Number(ctx.hitByAttackDice) || 0;
      const diceRolled = Number(ctx.diceRolled) || 0;
      const baseDamage = Number(ctx.baseDamage) || 0;
      const baseStaggerDamage = Number(ctx.baseStaggerDamage) || 0;
      const baseAttackPower = Number(ctx.baseAttackPower) || 0;
      const baseAttackValue = Number(ctx.baseAttackValue) || 0;
      const baseDefenseValue = Number(ctx.baseDefenseValue) || 0;
      const baseEvadeValue = Number(ctx.baseEvadeValue) || 0;
      const baseSpeed = Number(ctx.baseSpeed) || 0;
      const extraFixedDamage = Number(ctx.extraFixedDamage) || 0;
      const attacksInSameSpeedDie = Number(ctx.attacksInSameSpeedDie) || 0;

      switch(entry.type){
        case "burn":
          return { immediateDamage:0, endSceneDamage:stacks, endSceneStaggerDamage:0, nextStacks:floorTwoThirds(stacks), details:`幕結束傷害 ${stacks}，下一幕層數 ${floorTwoThirds(stacks)}` };
        case "bleed":{
          let total = 0, current = stacks;
          for(let i=0;i<attackRolls;i++){ total += current; current = ceilTwoThirds(current); }
          return { immediateDamage:total, endSceneDamage:0, endSceneStaggerDamage:0, nextStacks:current, details:`${attackRolls} 次攻擊骰後共受傷 ${total}，剩餘層數 ${current}` };
        }
        case "tremor":
          return { immediateDamage:0, endSceneDamage:0, endSceneStaggerDamage:stacks, nextStacks:floorTwoThirds(stacks), details:`幕結束混亂傷害 ${stacks}，下一幕層數 ${floorTwoThirds(stacks)}` };
        case "paralysis":
          return { immediateDamage:0, endSceneDamage:0, endSceneStaggerDamage:0, nextStacks:0, details:`本幕需讓 ${stacks} 個接下來使用的骰子重擲並取較低值` };
        case "guard":{
          const final = clampMin(baseDamage - stacks, 0);
          return { immediateDamage:0, endSceneDamage:0, endSceneStaggerDamage:0, nextStacks:stacks, details:`基礎傷害 ${baseDamage} → 修正後 ${final}` };
        }
        case "staggerGuard":{
          const final = clampMin(baseStaggerDamage - stacks, 0);
          return { immediateDamage:0, endSceneDamage:0, endSceneStaggerDamage:0, nextStacks:stacks, details:`基礎混亂傷害 ${baseStaggerDamage} → 修正後 ${final}` };
        }
        case "strength":{
          const finalDamage = baseAttackPower + stacks;
          const finalValue = clampMin(baseAttackValue + stacks, 1);
          return { immediateDamage:0, endSceneDamage:0, endSceneStaggerDamage:0, nextStacks:stacks, details:`攻擊傷害 ${baseAttackPower} → ${finalDamage}；達成值 ${baseAttackValue} → ${finalValue}` };
        }
        case "endurance":{
          const finalDefense = clampMin(baseDefenseValue + stacks, 1);
          const finalEvade = clampMin(baseEvadeValue + stacks, 1);
          return { immediateDamage:0, endSceneDamage:0, endSceneStaggerDamage:0, nextStacks:stacks, details:`防禦值 ${baseDefenseValue} → ${finalDefense}；迴避值 ${baseEvadeValue} → ${finalEvade}` };
        }
        case "haste":{
          const finalSpeed = clampMin(baseSpeed + stacks, 1);
          return { immediateDamage:0, endSceneDamage:0, endSceneStaggerDamage:0, nextStacks:stacks, details:`速度值 ${baseSpeed} → ${finalSpeed}` };
        }
        case "charge":
          return { immediateDamage:0, endSceneDamage:0, endSceneStaggerDamage:0, nextStacks:clampMax(stacks,10), details:`目前充能 ${clampMax(stacks,10)} / 10` };
        case "smoke":{
          const capped = clampMax(stacks,10);
          const finalDamage = Math.floor(baseDamage * (1 + capped * 0.05));
          const bonus = capped >= 9 ? 1 : 0;
          return { immediateDamage:0, endSceneDamage:0, endSceneStaggerDamage:0, nextStacks:Math.max(capped - 1, 0), details:`受到傷害 ${baseDamage} → ${finalDamage}；值加成 ${bonus ? "+1" : "0"}；幕末剩 ${Math.max(capped - 1, 0)}` };
        }
        case "fairy":{
          const immediateDamage = diceRolled * stacks;
          return { immediateDamage, endSceneDamage:stacks, endSceneStaggerDamage:0, nextStacks:floorTwoThirds(stacks), details:`擲骰 ${diceRolled} 次即時受傷 ${immediateDamage}；幕末再受 ${stacks}；下一幕 ${floorTwoThirds(stacks)}` };
        }
        case "scorchTremor":
          return { immediateDamage:0, endSceneDamage:stacks + extraFixedDamage, endSceneStaggerDamage:stacks, nextStacks:floorTwoThirds(stacks), details:`幕末受 ${stacks} 混亂傷害 + ${stacks + extraFixedDamage} 固定傷害，下一幕 ${floorTwoThirds(stacks)}` };
        case "duel":
          return { immediateDamage:0, endSceneDamage:0, endSceneStaggerDamage:0, nextStacks:(ctx.contested || ctx.staggered) ? stacks : 0, details:(ctx.contested || ctx.staggered) ? "符合保留條件，狀態維持" : "未拚點且未陷入混亂，幕末解除" };
        case "fatigue":{
          const over = Math.max(attacksInSameSpeedDie - stacks, 0);
          let hitPenalty = 0;
          let damageRate = 1;
          if(over === 1){ hitPenalty = -2; damageRate = 0.5; }
          else if(over === 2){ hitPenalty = -3; damageRate = 0.34; }
          else if(over >= 3){ hitPenalty = -4; damageRate = 0.25; }
          return { immediateDamage:0, endSceneDamage:0, endSceneStaggerDamage:0, nextStacks:stacks, details:`同速骰攻擊 ${attacksInSameSpeedDie} 枚，超出 ${over}；命中 ${hitPenalty}，傷害倍率 ${Math.round(damageRate*100)}%` };
        }
        case "rupture":{
          let total = 0, current = stacks;
          for(let i=0;i<hitByAttackDice;i++){ total += current; current = ceilTwoThirds(current); }
          return { immediateDamage:total, endSceneDamage:0, endSceneStaggerDamage:0, nextStacks:current, details:`被攻擊型骰命中 ${hitByAttackDice} 次，共受傷 ${total}；剩餘層數 ${current}` };
        }
        default:
          return { immediateDamage:0, endSceneDamage:0, endSceneStaggerDamage:0, nextStacks:stacks, details:"尚未定義" };
      }
    }

    function render(){
      const entriesBox = document.getElementById("entries");
      const resultsBox = document.getElementById("results");

      entriesBox.innerHTML = entries.map(entry => {
        const meta = getMeta(entry.type);
        const options = EFFECTS.map(e => `<option value="${e.key}" ${e.key===entry.type?'selected':''}>${e.name}</option>`).join("");
        return `
          <div class="entry">
            <div class="row">
              <div>
                <div class="badge">${meta.group}</div>
                <label>狀態名稱</label>
                <select onchange="updateEntryType(${entry.id}, this.value)">${options}</select>
                <div class="note">${meta.note}</div>
              </div>
              <div>
                <label>層數 / 數值 X</label>
                <input type="number" value="${entry.stacks}" oninput="updateEntryStacks(${entry.id}, this.value)">
              </div>
              <div>
                <button class="btn-outline" onclick="removeEntry(${entry.id})">刪除</button>
              </div>
            </div>
          </div>
        `;
      }).join("");

      const resolved = entries.map(entry => ({ entry, meta:getMeta(entry.type), result:resolveEntry(entry) }));
      const sumImmediate = resolved.reduce((s,x)=>s+(x.result.immediateDamage||0),0);
      const sumEndDamage = resolved.reduce((s,x)=>s+(x.result.endSceneDamage||0),0);
      const sumEndStagger = resolved.reduce((s,x)=>s+(x.result.endSceneStaggerDamage||0),0);

      document.getElementById("sumImmediate").textContent = sumImmediate;
      document.getElementById("sumEndDamage").textContent = sumEndDamage;
      document.getElementById("sumEndStagger").textContent = sumEndStagger;
      document.getElementById("btnContested").textContent = ctx.contested ? "是" : "否";
      document.getElementById("btnContested").className = ctx.contested ? "btn-primary" : "btn-outline";
      document.getElementById("btnStaggered").textContent = ctx.staggered ? "是" : "否";
      document.getElementById("btnStaggered").className = ctx.staggered ? "btn-primary" : "btn-outline";

      resultsBox.innerHTML = resolved.map(item => `
        <div class="result-card">
          <div class="result-head">
            <h3>${item.meta.name}</h3>
            <div class="badge">${item.entry.stacks} 層</div>
          </div>
          <div class="result-desc">${item.result.details}</div>
          <div class="mini-grid">
            <div class="mini"><div class="k">即時傷害</div><div class="v">${item.result.immediateDamage || 0}</div></div>
            <div class="mini"><div class="k">幕末傷害</div><div class="v">${item.result.endSceneDamage || 0}</div></div>
            <div class="mini"><div class="k">幕末混亂傷害</div><div class="v">${item.result.endSceneStaggerDamage || 0}</div></div>
            <div class="mini"><div class="k">下一幕層數</div><div class="v">${item.result.nextStacks ?? item.entry.stacks}</div></div>
          </div>
        </div>
      `).join("");
    }

    function updateCtxNum(key, value){
      ctx[key] = Number(value);
      render();
    }

    function toggleFlag(key){
      ctx[key] = !ctx[key];
      render();
    }

    function addEntry(){
      entries.push({ id: Date.now(), type:"burn", stacks:1 });
      render();
    }

    function removeEntry(id){
      entries = entries.filter(x => x.id !== id);
      render();
    }

    function updateEntryType(id, type){
      entries = entries.map(x => x.id===id ? { ...x, type } : x);
      render();
    }

    function updateEntryStacks(id, stacks){
      entries = entries.map(x => x.id===id ? { ...x, stacks:Number(stacks) } : x);
      render();
    }

    function applyEndScene(){
      entries = entries.map(x => ({ ...x, stacks: resolveEntry(x).nextStacks })).filter(x => Number(x.stacks) > 0);
      render();
    }

    function resetDemo(){
      entries = [
        { id: 1, type:"burn", stacks:3 },
        { id: 2, type:"bleed", stacks:4 }
      ];
      ctx = {
        attackRolls: 2,
        hitByAttackDice: 1,
        diceRolled: 2,
        baseDamage: 10,
        baseStaggerDamage: 8,
        baseAttackPower: 5,
        baseAttackValue: 4,
        baseDefenseValue: 4,
        baseEvadeValue: 5,
        baseSpeed: 3,
        extraFixedDamage: 0,
        attacksInSameSpeedDie: 1,
        contested: false,
        staggered: false,
      };
      document.querySelectorAll("input").forEach(el => {
        if(el.id && ctx.hasOwnProperty(el.id)) el.value = ctx[el.id];
      });
      render();
    }

    render();
  </script>
</body>
</html>
